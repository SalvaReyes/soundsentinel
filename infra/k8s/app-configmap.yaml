apiVersion: v1
kind: ConfigMap
metadata:
  name: soundsentinel-config
  namespace: soundsentinel
data:
  SOUNDSENTINEL_APP_NAME: "SoundSentinel"
  SOUNDSENTINEL_ENVIRONMENT: "production"
  SOUNDSENTINEL_DEBUG: "false"
  SOUNDSENTINEL_APP_VERSION: "0.1.0"
  SOUNDSENTINEL_MAX_AUDIO_UPLOAD_BYTES: "2000000"
  SOUNDSENTINEL_SPIKE_PEAK_THRESHOLD: "0.8"
  SOUNDSENTINEL_SUSTAINED_NOISE_THRESHOLD: "0.2"
  SOUNDSENTINEL_SUSTAINED_NOISE_WINDOW_SECONDS: "1"
  SOUNDSENTINEL_REPEATED_PEAK_THRESHOLD: "0.55"
  SOUNDSENTINEL_REPEATED_PEAK_WINDOW_SECONDS: "2"
  SOUNDSENTINEL_REPEATED_PEAK_MIN_COUNT: "3"
  SOUNDSENTINEL_ALERT_COOLDOWN_SECONDS: "60"
  SOUNDSENTINEL_SENSOR_OFFLINE_THRESHOLD_SECONDS: "120"
  SOUNDSENTINEL_NOTIFICATION_REQUEST_TIMEOUT_SECONDS: "10"
  SOUNDSENTINEL_TELEGRAM_API_BASE_URL: "https://api.telegram.org"
  SOUNDSENTINEL_POSTGRES_HOST: "soundsentinel-postgres"
  SOUNDSENTINEL_POSTGRES_PORT: "5432"
  SOUNDSENTINEL_POSTGRES_DB: "soundsentinel"

