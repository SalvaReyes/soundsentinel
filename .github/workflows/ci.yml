name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Build Docker image
        run: docker build -t soundsentinel:${{ github.sha }} .

  publish:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image reference
        id: image
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "image_ref=ghcr.io/${owner}/soundsentinel:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_ref=ghcr.io/${owner}/soundsentinel:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag "${{ steps.image.outputs.image_ref }}" \
            --tag "${{ steps.image.outputs.latest_ref }}" \
            --push \
            .

  deploy:
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Add VPS to known hosts
        run: |
          mkdir -p "$HOME/.ssh"
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> "$HOME/.ssh/known_hosts"

      - name: Deploy to K3s VPS
        env:
          SOUNDSENTINEL_POSTGRES_PASSWORD: ${{ secrets.SOUNDSENTINEL_POSTGRES_PASSWORD }}
          SOUNDSENTINEL_TELEGRAM_BOT_TOKEN: ${{ secrets.SOUNDSENTINEL_TELEGRAM_BOT_TOKEN }}
          SOUNDSENTINEL_TELEGRAM_CHAT_ID: ${{ secrets.SOUNDSENTINEL_TELEGRAM_CHAT_ID }}
          SOUNDSENTINEL_PUBLIC_HOST: ${{ secrets.SOUNDSENTINEL_PUBLIC_HOST }}
        run: |
          chmod +x scripts/deploy_single_vps.sh
          ./scripts/deploy_single_vps.sh \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "${{ needs.publish.outputs.image_ref }}" \
            "${SOUNDSENTINEL_PUBLIC_HOST:-}"
